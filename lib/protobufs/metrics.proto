syntax = "proto3";

// Per-DRB (Data Radio Bearer) metrics from MAC/RLC layer
message DrbMetrics {
    uint32 lcid = 1;           // Logical Channel ID (4+ for DRBs, 1-3 for SRBs)
    uint32 dl_buffer = 2;      // DL pending bytes for this DRB (RLC buffer)
    uint32 ul_buffer = 3;      // UL pending bytes for this DRB (from BSR)
    float tx_bytes = 4;        // DL bytes scheduled for this DRB
    float rx_bytes = 5;        // UL bytes received for this DRB
}

// Per-DRB PDCP layer metrics (from CU-UP)
message PdcpDrbMetrics {
    uint32 drb_id = 1;         // DRB ID (1-32)
    // TX (DL) metrics
    uint32 tx_pdus = 2;        // Number of PDCP PDUs transmitted
    uint32 tx_pdu_bytes = 3;   // Total TX PDU bytes
    uint32 tx_dropped_sdus = 4; // SDUs dropped (buffer full, early drop)
    // RX (UL) metrics  
    uint32 rx_pdus = 5;        // Number of PDCP PDUs received
    uint32 rx_pdu_bytes = 6;   // Total RX PDU bytes
    uint32 rx_dropped_pdus = 7; // PDUs dropped (integrity fail, etc)
    uint32 rx_delivered_sdus = 8; // SDUs delivered to upper layer
}

// GTP-U metrics per UE (N3 interface to/from UPF)
message GtpMetrics {
    uint32 dl_pkts = 1;        // DL GTP-U packets received from core (UPF)
    uint32 dl_bytes = 2;       // DL GTP-U bytes received from core
    uint32 ul_pkts = 3;        // UL GTP-U packets sent to core (UPF)
    uint32 ul_bytes = 4;       // UL GTP-U bytes sent to core
}

message UeMetrics {
    uint32 rnti = 1;
    uint32 cqi = 2;
    float snr = 3;
    float tx_bytes = 4;        // Total DL bytes (aggregate)
    float rx_bytes = 5;        // Total UL bytes (aggregate)
    uint32 dl_buffer = 6;      // Total DL pending bytes (aggregate)
    uint32 ul_buffer = 7;      // Total UL pending bytes (aggregate)
    float dl_tbs = 8;
    // HARQ ACK/NACK counters per TTI
    uint32 dl_ok = 9;          // DL packets ACKed (HARQ ACK from UE)
    uint32 dl_nok = 10;        // DL packets NACKed (HARQ NACK from UE)
    uint32 ul_ok = 11;         // UL packets OK (CRC pass)
    uint32 ul_nok = 12;        // UL packets NOK (CRC fail)
    // Per-DRB metrics (MAC/RLC layer)
    repeated DrbMetrics drb_metrics = 13;
    // Per-DRB PDCP metrics (from CU-UP)
    repeated PdcpDrbMetrics pdcp_drb_metrics = 14;
    // GTP-U metrics (N3 interface)
    GtpMetrics gtp_metrics = 15;
}

message Metrics {
    uint32 tti_cnt = 1;
    repeated UeMetrics ue_metrics = 2;
}
